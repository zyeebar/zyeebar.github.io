<script src="https://cdn.jsdelivr.net/npm/medium-zoom@1.1.0/dist/medium-zoom.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    const images = document.querySelectorAll(".post-content img");
    const isMobile = window.innerWidth <= 768;

    images.forEach(img => {
      let customMargin = 40; // 賦予所有圖片一個初始預設邊距

      if (isMobile) {
        return;
      } else {
        // 電腦版根據 Class 分配邊距
        if (img.closest('.img-3-2')) {
          img.setAttribute('data-aspect', '3-2');
          customMargin = 80;
        } else if (img.closest('.img-grid')) {
          img.setAttribute('data-aspect', '3-4');
          customMargin = 40;
        } else if (img.closest('.img-fit')) {
          img.setAttribute('data-aspect', 'fit');
          customMargin = 40;
        }
      }

      mediumZoom(img, {
        margin: customMargin,
        background: 'transparent', // 必須設為透明，CSS 的毛玻璃模糊才看得到
        scrollOffset: 0
      });
    });
  });
</script>
